<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resolver problema</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }

        .contenedor { display: flex; gap: 20px; height: 80vh; }

        .panel-problema { width: 40%; overflow-y: auto; }

        .panel-editor { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        textarea { flex: 1; width: 100%; font-family: monospace; font-size: 14px; padding: 8px; resize: none; }

        select, button { padding: 6px 12px; font-size: 14px; }

        #resultado { background: #f4f4f4; padding: 10px; min-height: 80px; white-space: pre-wrap; font-family: monospace; font-size: 13px; }

        #estado-ejecucion { min-height: 20px; font-size: 13px; font-weight: 600; }

        .correcto   { color: green; }
        .error      { color: red; }
        .advertencia{ color: orange; }
        .ejecutando { color: #b36b00; }
    </style>
</head>
<body>

<h2 id="titulo-problema">Cargando…</h2>
<div id="meta" style="color:gray; font-size:14px"></div>
<hr>

<div class="contenedor">

    <div class="panel-problema">
        <div id="descripcion">Cargando descripción…</div>

        <hr>
        <div>
            <strong>Categoría:</strong> <span id="categoria">—</span><br>
            <strong>Dificultad:</strong> <span id="dificultad">—</span>
        </div>

        <hr>
        <div>
            <strong>Restricciones:</strong>
            <pre id="restricciones" style="background:#f8f8f8; padding:8px;">—</pre>
        </div>

        <hr>
        <div>
            <strong>Ejemplo - Entrada:</strong>
            <pre id="ejemplo_entrada" style="background:#f0f0f0; padding:8px;">—</pre>
            <strong>Ejemplo - Salida:</strong>
            <pre id="ejemplo_salida" style="background:#f0f0f0; padding:8px;">—</pre>
        </div>
    </div>

    <div class="panel-editor">
        <div>
            <select id="selector-lenguaje">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
            </select>
            <button onclick="ejecutar()" id="btn-ejecutar">▶ Ejecutar</button>
        </div>

        <div id="estado-ejecucion"></div>

        <textarea id="editor" placeholder="Escribe tu solución aquí..."></textarea>

        <div>
            <strong>Resultado:</strong>
            <div id="resultado">Ejecuta tu código para ver el resultado.</div>
        </div>
    </div>

</div>

<script>
    // problema id passed from server route
    const PROBLEMA_ID = {{ problema_id | tojson }};

    window.addEventListener('DOMContentLoaded', () => {
        cargarProblema();
    });

    async function cargarProblema() {
        try {
            const res = await fetch('/api/problems/' + encodeURIComponent(PROBLEMA_ID));
            if (!res.ok) throw new Error('No se pudo obtener el problema');
            const p = await res.json();

            document.getElementById('titulo-problema').textContent = p.titulo || 'Sin título';
            document.getElementById('descripcion').innerHTML = p.descripcion || '';
            document.getElementById('categoria').textContent = p.categoria || '—';
            document.getElementById('dificultad').textContent = (p.dificultad || '—');
            document.getElementById('restricciones').textContent = p.restricciones || '—';
            document.getElementById('ejemplo_entrada').textContent = p.ejemplo_entrada || '—';
            document.getElementById('ejemplo_salida').textContent = p.ejemplo_salida || '—';

            // prefill editor with ejemplo_entrada to help testing
            if (p.ejemplo_entrada) document.getElementById('editor').value = '# Ejemplo entrada:\n' + p.ejemplo_entrada + '\n\n';

        } catch (err) {
            document.getElementById('titulo-problema').textContent = 'No se encontró el problema';
            document.getElementById('descripcion').textContent = '';
        }
    }

    async function ejecutar() {
        const codigo = document.getElementById("editor").value;
        const lenguaje = document.getElementById("selector-lenguaje").value;
        const btn = document.getElementById("btn-ejecutar");
        const resultadoDiv = document.getElementById("resultado");
        const estadoDiv = document.getElementById("estado-ejecucion");

        if (!codigo.trim()) {
            resultadoDiv.className = "advertencia";
            resultadoDiv.textContent = "⚠ Escribe algún código antes de ejecutar.";
            return;
        }

        btn.disabled = true;
        btn.textContent = "⏳ Ejecutando...";
        estadoDiv.className = "ejecutando";
        estadoDiv.textContent = "Ejecutando...";
        resultadoDiv.className = "";
        resultadoDiv.textContent = "";

        try {
            const response = await fetch("/ejecutar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ codigo, lenguaje, problema_id: PROBLEMA_ID })
            });

            if (response.status === 409) {
                const conflicto = await response.json();
                estadoDiv.className = "advertencia";
                estadoDiv.textContent = "Ya hay una ejecución en curso para este usuario.";
                resultadoDiv.className = "advertencia";
                resultadoDiv.textContent = conflicto.error || "Ya hay una ejecución en curso.";
                return;
            }

            const resultado = await response.json();
            estadoDiv.className = "correcto";
            estadoDiv.textContent = "Ejecución finalizada.";
            mostrarResultado(resultado);

        } catch (e) {
            estadoDiv.className = "error";
            estadoDiv.textContent = "No se pudo completar la ejecución.";
            resultadoDiv.className = "error";
            resultadoDiv.textContent = "❌ No se pudo conectar con el servidor.";
        } finally {
            btn.disabled = false;
            btn.textContent = "▶ Ejecutar";
        }
    }

    function mostrarResultado(resultado) {
        const div = document.getElementById("resultado");

        if (resultado.timeout || resultado.supero_tiempo_limite) {
            div.className = "advertencia";
            div.textContent = "⏱ Tiempo límite excedido. Revisa si tienes un bucle infinito.";
        } else if (resultado.tipo_error === "compilacion") {
            div.className = "error";
            div.textContent = "🔴 Error de compilación:\n\n" + (resultado.stderr || resultado.error || '');
        } else if (resultado.tipo_error === "ejecucion") {
            div.className = "error";
            div.textContent = "🟠 Error de ejecución:\n\n" + (resultado.stderr || resultado.error || '');
        } else if (resultado.tipo_error === "sistema") {
            div.className = "error";
            div.textContent = "⚙️ " + (resultado.stderr || resultado.error || '');
        } else {
            div.className = "correcto";
            div.textContent = "✅ Correcto:\n\n" + (resultado.stdout || resultado.output || "(sin salida)");
        }
    }
</script>

</body>
</html>
